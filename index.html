<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>だれのポケパーティー？</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2b2f77">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header">
  <h1>だれのポケパーティー？</h1>
  <p class="subtitle">キャラが持ってそうなポケモンを6匹選ぼう</p>
</header>

<main id="build-screen">

  <section class="field">
    <label for="charName">キャラ名</label>
    <input type="text" id="charName" placeholder="例：ハイダイ" autocomplete="off">
  </section>

  <section class="field">
    <label for="pokeSearch">ポケモン名で検索（ひらがな・カタカナOK）</label>
    <input type="text" id="pokeSearch" placeholder="例：どろんち" autocomplete="off">
  </section>

  <section id="candidates" class="candidates" aria-live="polite"></section>

  <section class="slots-section">
    <p class="slots-label">選択済み（<span id="slotCount">0</span>/6）</p>
    <div id="slots" class="slots-grid"></div>
  </section>

  <button id="gotoResultBtn" class="primary-btn">この内容で完成画面へ</button>
  <button id="resetBtn" class="ghost-btn">最初からやり直す</button>

</main>

<main id="result-screen" class="hidden">
  <div id="resultCard" class="result-card">
    <div class="result-header">
      <button id="photoBtn" class="photo-circle" aria-label="キャラの写真を選ぶ">
        <img id="photoImg" class="hidden" alt="">
        <i id="cameraIcon" class="camera-icon">📷</i>
      </button>
      <div class="result-title">
        <p id="resultName" class="result-name"></p>
        <p class="result-caption">が持ってそうなポケモン</p>
      </div>
    </div>
    <div id="resultGrid" class="result-grid"></div>
  </div>
  <input type="file" id="photoInput" accept="image/*" class="hidden">

  <div class="result-actions">
    <button id="saveBtn" class="primary-btn">カード画像を作成</button>
    <button id="backBtn" class="ghost-btn">選び直す</button>
  </div>

  <div id="finalImageWrap" class="final-image-wrap hidden">
    <img id="finalImage" alt="完成したポケパーティーの画像">
    <p class="save-hint">↑ 画像を長押しして「写真に保存」を選んでください</p>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="app.js"></script>
</body>
</html>
